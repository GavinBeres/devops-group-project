trigger:
- main

pool:
  name: Default

variables:
  buildConfiguration: 'Release'

stages:

# CI pipeline for MVC group project
- stage: Build
  displayName: Build Stage
  jobs:
  - job: BuildJob
    displayName: Build Job
    steps:

    - task: UseDotNet@2
      displayName: 'Use .NET 8 SDK'
      inputs:
        packageType: 'sdk'
        version: '8.0.x'

    - task: SonarCloudPrepare@3
      displayName: 'Prepare SonarCloud Analysis'
      inputs:
        SonarCloud: 'sonarcloud-connection'
        organization: 'gavinberes'
        scannerMode: 'dotnet'
        projectKey: 'GavinBeres_devops-group-project'
        projectName: 'devops-group-project'

    - script: dotnet restore MvcAgileProcessApp.sln
      displayName: 'Restore'

    - script: dotnet build MvcAgileProcessApp.sln --configuration $(buildConfiguration)
      displayName: 'Build'

    - script: dotnet test MvcAgileProcessApp.sln --configuration $(buildConfiguration)
      displayName: 'Run Unit Tests'

    - task: SonarCloudAnalyze@3
      displayName: 'Run SonarCloud Analysis'

    - task: SonarCloudPublish@3
      displayName: 'Publish SonarCloud Quality Gate'
      inputs:
        pollingTimeoutSec: '300'

    - script: dotnet publish MvcAgileProcessApp.sln --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)
      displayName: 'Publish'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish Artifact'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'drop'
        publishLocation: 'Container'


# CD Stage for deploying MVC app
- stage: Deploy
  displayName: CD Deploy Stage
  dependsOn: Build
  jobs:
  - deployment: DeployWeb
    displayName: Deploy MVC App
    environment: mvc-webapp-env
    strategy:
      runOnce:
        deploy:
          steps:

          - download: current
            artifact: drop

          - script: |
              echo "Deploying MVC App..."
              dir $(Pipeline.Workspace)
            displayName: 'Simulated Deployment'
